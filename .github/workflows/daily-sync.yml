name: Daily Data Sync

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 ≈ 台北 08:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync NBA + MLB daily
        env:
          PLAYSPORT_ENABLED: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python main.py sync --mode daily --sport all --days 7 --force
          python main.py sync --mode backtest --sport all
          python main.py push-db

      - name: Commit database if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sportsbet.db || true
          git diff --staged --quiet || git commit -m "chore(data): automated daily sync"
          git push
